<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
</head>
<body>

    <h1>Application Form</h1>

    <form action="/submit">

        <input type="text" name="username" placeholder="Username">
        <br><br>

        <input type="password" name="password" placeholder="Password">
        <br><br>
        Full Name:
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
        <br><br>

        Date of Birth:
        <input type="date" id="dob" name="dob">
        <br><br>

        Gender:
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <br><br>
        
        Favorite Subjects:
        <br>
        <input type="checkbox" id="maths" name="subject" value="Maths">
        <label for="maths">Maths</label>
        <br>

        <input type="checkbox" id="physics" name="subject" value="Physics">
        <label for="physics">Physics</label>
        
        <br>
        <input type="checkbox" id="chemistry" name="subject" value="Chemistry">
        <label for="chemistry">Chemistry</label>
        
        <br>
        <input type="checkbox" id="cs" name="subject" value="Computer Science">
        <label for="cs">Computer Science</label>

       <br><br>

        Hobbies:
        <input type="checkbox" name="hobby" value="cricket"> Cricket
        <input type="checkbox" name="hobby" value="music"> Music
        <br><br>

        City:
        <select name="city">
            <option>Bangalore</option>
            <option>Belagavi</option>
            <option>Hubli</option>
        </select>
        <br><br>

        Feedback:
        <br>
        <textarea name="feedback" rows="4" cols="30"></textarea>
        <br><br>
        
        <input type="submit" value="submit">
        
        <iframe width="400" height="250"
        src="https://www.wikipedia.org">
        </iframe>
        

        

    </form>

</body>
</html>
