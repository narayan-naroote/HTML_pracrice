<!DOCTYPE html>
<html>
  <head>
    <title>Unordered List</title>
  </head>

  <body>

    <main>

      <ul>

        <li>
          Apple
          <ul>
            <li>Colour: Red</li>
            <li>Season: Winter</li>
          </ul>
        </li>

        <li>
          Guava
          <ul>
            <li>Colour: Green</li>
            <li>Season: Summer</li>
          </ul>
        </li>

        <li>
          Banana
          <ul>
            <li>Colour: Yellow</li>
            <li>Season: Summer</li>
          </ul>
        </li>

      </ul>

    </main>

  </body>
</html>
