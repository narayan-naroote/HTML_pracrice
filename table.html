<!DOCTYPE html>
<html>
  <head>
    <title>Creating Table</title>
  </head>

  <body>

    <main>
      <!--border gives lines-->

      <table border="1">

        <caption>Student Data</caption>

        <thead>
          <tr>
            <th>Name</th>
            <th>Roll No</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Narayan</td>
            <td>767</td>
          </tr>
        </tbody>

      </table>

    </main>

  </body>
</html>
